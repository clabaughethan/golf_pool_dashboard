name: Keep Alive

on:
  schedule:
    # Every 14 minutes. Streamlit free tier sleeps after ~7 days idle.
    # Pinging the app loads a page, which queries Supabase, keeping both alive.
    - cron: "*/14 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Streamlit App
        run: |
          curl -s -o /dev/null -w "%{http_code}\n" \
            --max-time 90 \
            "https://wasylakgolfpoolapp.streamlit.app/" || true
